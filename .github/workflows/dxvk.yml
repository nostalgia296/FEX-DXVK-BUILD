name: Build "DXVK"

on:
  workflow_dispatch:

jobs:
  start_building_dxvk:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v3

    - name: Execute build script
      run: |
         bash ./arm64ec_dxvk_build.sh

    - name: Get current date
      id: date
      run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Release "DXVK"
      uses: softprops/action-gh-release@v1
      with:
        body: DXVK BUILD
        tag_name: ${{ steps.date.outputs.DATE }}
        name: DXVK BUILD ${{ steps.date.outputs.DATE }}
        files: |
           /tmp/dxvk/dxvk-arm64ec.tar.zst
